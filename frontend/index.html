<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavé — Rutas Bici de Carretera</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#0c0e14;--s:#13161f;--s2:#1c2030;--s3:#252a3a;--y:#e8d01c;--yd:rgba(232,208,28,0.12);--r:#e84d1c;--t:#eeeae0;--m:#6b6f82;--b:rgba(255,255,255,0.07);--rad:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:0 16px;height:48px;background:var(--s);border-bottom:1px solid var(--b);flex-shrink:0}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--y)}
.logo-tag{font-size:10px;color:var(--m)}
header .sp{flex:1}
.pills{display:flex;gap:4px}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--b);color:var(--m);background:transparent;cursor:pointer;transition:.2s}
.pill.on{background:var(--yd);border-color:var(--y);color:var(--y)}
.app{display:flex;flex:1;overflow:hidden}
.panel{width:300px;flex-shrink:0;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.mwrap{flex:1;position:relative}
#map{width:100%;height:100%}
.mbanner{padding:10px 14px;background:var(--yd);border-bottom:1px solid rgba(232,208,28,.2);font-size:11px;color:var(--y);flex-shrink:0}
.pscroll{flex:1;overflow-y:auto;padding-bottom:12px}
.pscroll::-webkit-scrollbar{width:3px}
.pscroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.sec{padding:12px 14px;border-bottom:1px solid var(--b)}
.slabel{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--m);margin-bottom:8px}

/* ── Puntos ── */
.pt-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px}
.pt-row:last-child{margin-bottom:0}
.pt-label{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;margin-top:2px;border:1px solid var(--b)}
.pt-label.first{background:var(--y);color:#0c0e14;border-color:var(--y)}
.pt-label.last{background:var(--r);color:#fff;border-color:var(--r)}
.pt-label.mid{background:var(--s3);color:var(--t)}
.pt-content{flex:1;min-width:0}
.pt-remove{width:20px;height:20px;border-radius:4px;background:transparent;border:none;color:var(--m);cursor:pointer;font-size:12px;flex-shrink:0;margin-top:3px;transition:.2s;display:flex;align-items:center;justify-content:center}
.pt-remove:hover{color:var(--r)}
.pt-remove.hidden{visibility:hidden}

/* ── Conector visual entre puntos ── */
.pt-connector{width:22px;display:flex;justify-content:center;margin-bottom:-2px;margin-top:-2px;flex-shrink:0}
.pt-connector-line{width:1px;height:10px;background:var(--b)}

/* ── Search input ── */
.siw{position:relative}
.si{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 26px 7px 9px;border-radius:var(--rad);font-size:12px;outline:none;transition:.2s}
.si:focus{border-color:rgba(232,208,28,.4)}
.si::placeholder{color:var(--m)}
.sc{position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--m);cursor:pointer;font-size:12px;display:none;background:none;border:none}
.sc.on{display:block}
.sugs{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:500;background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);overflow:hidden;display:none;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.sugs.open{display:block}
.si-item{padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--b);transition:.12s}
.si-item:last-child{border-bottom:none}
.si-item:hover{background:var(--s3)}
.si-n{font-size:12px;color:var(--t)}
.si-s{font-size:10px;color:var(--m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Map mode display ── */
.mpd{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:7px 9px;font-size:11px;color:var(--m);min-height:32px;display:flex;align-items:center}
.mpd.set{color:var(--t);border-color:rgba(232,208,28,.25)}

/* ── Botones ── */
.btn-addpt{width:100%;margin-top:6px;padding:7px;border-radius:var(--rad);background:transparent;border:1px dashed var(--b);color:var(--m);font-size:11px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-addpt:hover{border-color:var(--y);color:var(--y)}
.bgeo{width:100%;margin-top:5px;padding:6px;border-radius:var(--rad);background:var(--s2);border:1px solid var(--b);color:var(--m);font-size:11px;cursor:pointer;transition:.2s}
.bgeo:hover{border-color:var(--m);color:var(--t)}
.orow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.orow:last-child{margin-bottom:0}
.olbl{font-size:12px;color:var(--m)}
.tog{position:relative;width:32px;height:17px}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--s3);border-radius:17px;border:1px solid var(--b);cursor:pointer;transition:.2s}
.tsl::after{content:'';position:absolute;left:2px;top:2px;width:11px;height:11px;background:var(--m);border-radius:50%;transition:.2s}
.tog input:checked+.tsl{background:var(--yd);border-color:var(--y)}
.tog input:checked+.tsl::after{transform:translateX(15px);background:var(--y)}
.bcalc{width:100%;padding:10px;border:none;border-radius:var(--rad);background:var(--y);color:#0c0e14;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.2s}
.bcalc:hover:not(:disabled){opacity:.9}
.bcalc:disabled{opacity:.3;cursor:not-allowed}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:8px 10px;text-align:center}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;line-height:1}
.sv.y{color:var(--y)}.sv.r{color:var(--r)}
.su{font-size:10px;color:var(--m);margin-top:2px;letter-spacing:.5px}
.ewrap{margin-top:10px}
.elbl{font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.erange{display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-top:2px}
.bgpx{width:100%;padding:8px;border-radius:var(--rad);background:transparent;border:1px solid var(--b);color:var(--m);font-size:12px;cursor:pointer;transition:.2s;margin-top:10px}
.bgpx:hover{border-color:var(--y);color:var(--y)}
.stl{display:flex;flex-direction:column}
.step{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--b);font-size:11px;align-items:flex-start}
.step:last-child{border-bottom:none}
.sic{width:20px;height:20px;border-radius:4px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--m)}
.stxt{flex:1;color:var(--t);line-height:1.4}.sd{color:var(--m);white-space:nowrap;font-size:10px}
.loading{display:none;position:absolute;inset:0;background:rgba(12,14,20,.8);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading.on{display:flex}
.spin{width:36px;height:36px;border-radius:50%;border:3px solid var(--s3);border-top-color:var(--y);animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lmsg{font-size:12px;color:var(--m)}
.mchint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(12,14,20,.9);border:1px solid var(--y);color:var(--y);font-size:11px;padding:6px 12px;border-radius:20px;z-index:300;pointer-events:none;display:none;white-space:nowrap}
.mchint.on{display:block}
.wake-banner{display:none;padding:8px 14px;background:rgba(232,208,28,0.08);border-bottom:1px solid rgba(232,208,28,0.15);font-size:11px;color:var(--m);text-align:center}
.wake-banner.on{display:block}
#res{display:none}#res.on{display:block}
</style>
</head>
<body>
<header>
  <div><div class="logo">Pavé</div><div class="logo-tag">Rutas bici de carretera</div></div>
  <div class="sp"></div>
  <div class="pills">
    <button class="pill on" id="ps" onclick="setMode('search')">🔍 Buscar</button>
    <button class="pill" id="pm" onclick="setMode('map')">🗺 Mapa</button>
  </div>
</header>

<div class="wake-banner" id="wake-banner">
  ⏳ El servidor está arrancando (puede tardar ~30s la primera vez)…
</div>

<div class="app">
  <div class="panel">
    <div class="mbanner" id="mb">Escribe un lugar para buscarlo</div>
    <div class="pscroll">
      <div class="sec">
        <div class="slabel">Paradas</div>
        <div id="pts-container"></div>
        <button class="btn-addpt" onclick="addPoint()">+ Añadir parada</button>
      </div>

      <div class="sec">
        <div class="slabel">Opciones</div>
        <div class="orow">
          <span class="olbl">Volver al origen</span>
          <label class="tog"><input type="checkbox" id="loop"><div class="tsl"></div></label>
        </div>
        <div class="orow">
          <span class="olbl">Evitar sin asfaltar</span>
          <label class="tog"><input type="checkbox" id="oun"><div class="tsl"></div></label>
        </div>
      </div>

      <div class="sec">
        <button class="bcalc" id="bc" onclick="calc()" disabled>Calcular ruta</button>
      </div>

      <div id="res">
        <div class="sec"><div class="slabel">Resumen</div>
          <div class="sgrid">
            <div class="stat"><div class="sv y" id="sd">—</div><div class="su">KM</div></div>
            <div class="stat"><div class="sv" id="st">—</div><div class="su">MIN</div></div>
            <div class="stat"><div class="sv r" id="sa">—</div><div class="su">M SUBIDA</div></div>
            <div class="stat"><div class="sv" id="sb">—</div><div class="su">M BAJADA</div></div>
          </div>
          <div class="ewrap"><div class="elbl">Elevación</div>
            <svg viewBox="0 0 270 54" preserveAspectRatio="none" style="display:block;width:100%;height:54px">
              <defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e8d01c" stop-opacity=".35"/>
                <stop offset="100%" stop-color="#e8d01c" stop-opacity=".03"/>
              </linearGradient></defs>
              <polygon id="ef" fill="url(#eg)" points=""/>
              <polyline id="el" fill="none" stroke="#e8d01c" stroke-width="1.5" stroke-linejoin="round" points=""/>
            </svg>
            <div class="erange"><span id="emn">—</span><span id="emx">—</span></div>
          </div>
          <button class="bgpx" onclick="xgpx()">⬇ Descargar GPX</button>
        </div>
        <div class="sec"><div class="slabel">Indicaciones</div><div class="stl" id="sl"></div></div>
      </div>
    </div>
  </div>

  <div class="mwrap">
    <div id="map"></div>
    <div class="mchint" id="mch"></div>
    <div class="loading" id="ld"><div class="spin"></div><div class="lmsg" id="lm"></div></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = '';

// ── Estado ────────────────────────────────────────────────────────────────
// pts = [{id, place}]  — lista ordenada de paradas, mínimo 2
let pts = [];
let ptCounter = 0;
const ST = {};        // timers debounce
const markers = {};   // id -> L.marker
let routeLayer = null;
let mode = 'search';

// ── Mapa ──────────────────────────────────────────────────────────────────
const map = L.map('map').setView([42.2, -8.7], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OSM © CARTO', maxZoom:19}).addTo(map);

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function markerColor(i, total) {
  if(i === 0)          return '#e8d01c'; // A — amarillo
  if(i === total - 1)  return '#e84d1c'; // último — rojo
  return '#a78bfa';                       // intermedios — violeta
}

function mkMarker(lat, lng, label, color) {
  return L.marker([lat, lng], {icon: L.divIcon({
    html: `<div style="width:24px;height:24px;background:${color};border:2px solid rgba(255,255,255,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:10px;font-weight:700;color:#0c0e14;box-shadow:0 2px 8px rgba(0,0,0,.5)">${label}</div>`,
    className:'', iconSize:[24,24], iconAnchor:[12,12]
  })});
}

function refreshMarkers() {
  // Borrar todos y redibujar con colores/letras actualizados
  Object.values(markers).forEach(m => m.remove());
  for(const k in markers) delete markers[k];
  pts.forEach((pt, i) => {
    if(!pt.place) return;
    const label = LETTERS[i] || (i+1);
    const color = markerColor(i, pts.length);
    markers[pt.id] = mkMarker(pt.place.lat, pt.place.lng, label, color).addTo(map);
  });
}

map.on('click', e => {
  if(mode !== 'map') return;
  const {lat, lng} = e.latlng;
  const empty = pts.find(p => !p.place);
  if(empty) {
    setPlace(empty.id, {lat, lng, name:`${lat.toFixed(4)}, ${lng.toFixed(4)}`});
    updateMapHint();
  }
});

// ── Render lista de puntos ────────────────────────────────────────────────
function renderPoints() {
  const container = document.getElementById('pts-container');
  container.innerHTML = '';

  pts.forEach((pt, i) => {
    const isFirst = i === 0;
    const isLast  = i === pts.length - 1;
    const letter  = LETTERS[i] || (i+1);
    const labelClass = isFirst ? 'first' : isLast ? 'last' : 'mid';
    const canRemove = pts.length > 2;

    // Línea conectora entre puntos
    if(i > 0) {
      const conn = document.createElement('div');
      conn.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:2px';
      conn.innerHTML = `<div style="width:22px;display:flex;justify-content:center"><div style="width:1px;height:8px;background:var(--b)"></div></div>`;
      container.appendChild(conn);
    }

    const row = document.createElement('div');
    row.className = 'pt-row';
    row.id = `pt-row-${pt.id}`;

    // Input según modo
    const searchHTML = `
      <div id="pt-sw-${pt.id}" class="siw" style="display:${mode==='search'?'block':'none'}">
        <input class="si" id="pt-inp-${pt.id}"
               placeholder="${isFirst ? 'Origen…' : isLast ? 'Destino…' : 'Parada…'}"
               autocomplete="off"
               value="${pt.place ? pt.place.name.split(',')[0] : ''}"
               oninput="hsP(${pt.id},this.value)"
               onfocus="ssP(${pt.id})">
        <button class="sc ${pt.place?'on':''}" id="pt-cl-${pt.id}" onclick="clearPlace(${pt.id})">✕</button>
        <div class="sugs" id="pt-sugs-${pt.id}"></div>
      </div>`;

    const mapHTML = `
      <div id="pt-mw-${pt.id}" style="display:${mode==='map'?'block':'none'}">
        <div class="mpd ${pt.place?'set':''}" id="pt-mpd-${pt.id}">
          ${pt.place ? pt.place.name.split(',')[0] : 'Sin fijar'}
        </div>
      </div>`;

    const geoBtn = isFirst
      ? `<button class="bgeo" onclick="geo()">📍 Mi ubicación</button>`
      : '';

    row.innerHTML = `
      <div class="pt-label ${labelClass}">${letter}</div>
      <div class="pt-content">
        ${searchHTML}
        ${mapHTML}
        ${geoBtn}
      </div>
      <button class="pt-remove ${canRemove?'':'hidden'}" onclick="removePoint(${pt.id})" title="Eliminar parada">✕</button>
    `;
    container.appendChild(row);
  });

  checkReady();
  updateMapHint();
}

// ── Gestión de puntos ─────────────────────────────────────────────────────
function addPoint() {
  pts.push({id: ++ptCounter, place: null});
  renderPoints();
}

function removePoint(id) {
  if(pts.length <= 2) return;
  pts = pts.filter(p => p.id !== id);
  if(markers[id]) { markers[id].remove(); delete markers[id]; }
  renderPoints();
  refreshMarkers(); // re-colorear
}

function setPlace(id, place) {
  const pt = pts.find(p => p.id === id);
  if(!pt) return;
  pt.place = place;
  renderPoints();
  refreshMarkers();
  fitAll();
  checkReady();
}

function clearPlace(id) {
  const pt = pts.find(p => p.id === id);
  if(!pt) return;
  pt.place = null;
  if(markers[id]) { markers[id].remove(); delete markers[id]; }
  renderPoints();
  checkReady();
}

function checkReady() {
  const filled = pts.filter(p => p.place);
  document.getElementById('bc').disabled = filled.length < 2;
}

function fitAll() {
  const filled = pts.filter(p => p.place);
  if(filled.length >= 2)
    map.fitBounds(filled.map(p => [p.place.lat, p.place.lng]), {padding:[60,60]});
  else if(filled.length === 1)
    map.setView([filled[0].place.lat, filled[0].place.lng], 13);
}

// ── Modo mapa / búsqueda ──────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('ps').classList.toggle('on', m==='search');
  document.getElementById('pm').classList.toggle('on', m==='map');
  document.getElementById('mb').textContent = m==='search'
    ? 'Escribe un lugar para buscarlo'
    : 'Haz clic en el mapa para fijar las paradas';
  renderPoints();
  if(m !== 'map') document.getElementById('mch').classList.remove('on');
}

function updateMapHint() {
  const h = document.getElementById('mch');
  if(mode !== 'map') { h.classList.remove('on'); return; }
  const empty = pts.find(p => !p.place);
  if(empty) {
    const i = pts.indexOf(empty);
    const letter = LETTERS[i] || (i+1);
    h.textContent = `Clic para fijar parada ${letter}`;
    h.classList.add('on');
  } else {
    h.classList.remove('on');
  }
}

// ── Geocoding ─────────────────────────────────────────────────────────────
function hsP(id, v) {
  document.getElementById(`pt-cl-${id}`)?.classList.toggle('on', v.length > 0);
  clearTimeout(ST[id]);
  if(v.length < 3) { csgP(id); return; }
  ST[id] = setTimeout(() => dsP(id, v), 320);
}
async function dsP(id, q) {
  try {
    const r = await fetch(`${API}/geocode?q=${encodeURIComponent(q)}`);
    const res = await r.json();
    rsP(id, res);
  } catch(e) { csgP(id); }
}
function rsP(id, res) {
  const b = document.getElementById(`pt-sugs-${id}`);
  if(!b || !res.length) { csgP(id); return; }
  b.innerHTML = res.slice(0,5).map(r => {
    const parts = r.name.split(','), n = parts[0], s = parts.slice(1,3).join(',').trim();
    const data = encodeURIComponent(JSON.stringify(r));
    return `<div class="si-item" onclick="pkP(${id},'${data}')"><div class="si-n">${n}</div><div class="si-s">${s}</div></div>`;
  }).join('');
  b.classList.add('open');
}
function pkP(id, data) { setPlace(id, JSON.parse(decodeURIComponent(data))); csgP(id); }
function ssP(id) { const b = document.getElementById(`pt-sugs-${id}`); if(b?.innerHTML) b.classList.add('open'); }
function csgP(id) { document.getElementById(`pt-sugs-${id}`)?.classList.remove('open'); }
document.addEventListener('click', e => {
  if(!e.target.closest('.siw')) pts.forEach(p => csgP(p.id));
});

function geo() {
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    setPlace(pts[0].id, {lat: pos.coords.latitude, lng: pos.coords.longitude, name: 'Mi ubicación'});
  });
}

// ── Calcular ──────────────────────────────────────────────────────────────
async function calc() {
  const filled = pts.filter(p => p.place);
  if(filled.length < 2) return;
  sl('Calculando ruta…');

  const loop = document.getElementById('loop').checked;
  const avoidFeatures = ['highways'];
  if(document.getElementById('oun').checked) avoidFeatures.push('unpaved');

  // Construir lista de coords: todas las paradas + volver al origen si loop
  const allPts = [...filled];
  if(loop) allPts.push(filled[0]);

  const start = allPts[0].place;
  const end   = allPts[allPts.length - 1].place;
  const waypoints = allPts.slice(1, -1).map(p => ({lat: p.place.lat, lng: p.place.lng}));

  try {
    const r = await fetch(`${API}/route`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        start:    {lat: start.lat, lng: start.lng},
        end:      {lat: end.lat,   lng: end.lng},
        waypoints,
        avoid_features: avoidFeatures,
      })
    });
    if(!r.ok) { alert('Error: ' + (await r.json()).detail); return; }
    const rt = await r.json();
    drR(rt); drS(rt); drE(rt.geometry); drT(rt.steps);
    document.getElementById('res').classList.add('on');
  } catch(e) {
    alert('No se pudo conectar al backend');
  } finally { hl(); }
}

function drR(r) {
  if(routeLayer) routeLayer.remove();
  routeLayer = L.polyline(r.geometry.map(p=>[p[1],p[0]]),
    {color:'#e8d01c', weight:4, opacity:.8, lineJoin:'round'}).addTo(map);
  map.fitBounds(routeLayer.getBounds(), {padding:[60,60]});
}
function drS(r) {
  document.getElementById('sd').textContent = r.distancia_km;
  document.getElementById('st').textContent = r.duracion_min;
  document.getElementById('sa').textContent = r.subida_m;
  document.getElementById('sb').textContent = r.bajada_m;
}
function hav(a,b,c,d){
  const R=6371,r=Math.PI/180,dl=(c-a)*r,dL=(d-b)*r,
        x=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dL/2)**2;
  return R*2*Math.asin(Math.sqrt(x));
}
function drE(geo) {
  const W=270,H=54,es=geo.map(p=>p[2]||0),mn=Math.min(...es),mx=Math.max(...es),rng=mx-mn||1;
  let d=0; const ds=[0];
  for(let i=1;i<geo.length;i++) ds.push(d+=hav(geo[i-1][1],geo[i-1][0],geo[i][1],geo[i][0]));
  const mD=d||1, st=Math.max(1,Math.floor(geo.length/100)), pts2=[];
  for(let i=0;i<geo.length;i+=st) pts2.push(i);
  if(pts2[pts2.length-1]!==geo.length-1) pts2.push(geo.length-1);
  const tx=i=>(ds[i]/mD)*W, ty=i=>H-2-((es[i]-mn)/rng)*(H-8);
  const pl=pts2.map(i=>`${tx(i).toFixed(1)},${ty(i).toFixed(1)}`).join(' ');
  document.getElementById('el').setAttribute('points', pl);
  document.getElementById('ef').setAttribute('points', `0,${H} ${pl} ${W},${H}`);
  document.getElementById('emn').textContent = `${Math.round(mn)}m`;
  document.getElementById('emx').textContent = `${Math.round(mx)}m`;
}
const IC={0:'↑',1:'→',2:'←',3:'↑',4:'↓',7:'⭕',12:'→',13:'←'};
function drT(steps) {
  document.getElementById('sl').innerHTML = steps.map(s => {
    const d=s.distancia_m||0, ds=d>=1000?`${(d/1e3).toFixed(1)}km`:`${d}m`;
    return `<div class="step"><div class="sic">${IC[s.type]||'↑'}</div><div class="stxt">${s.texto}</div><div class="sd">${ds}</div></div>`;
  }).join('');
}
async function xgpx() {
  const filled = pts.filter(p => p.place);
  if(filled.length < 2) return;
  sl('Generando GPX…');
  const loop = document.getElementById('loop').checked;
  const allPts = [...filled];
  if(loop) allPts.push(filled[0]);
  const start = allPts[0].place;
  const end   = allPts[allPts.length-1].place;
  const waypoints = allPts.slice(1,-1).map(p=>({lat:p.place.lat,lng:p.place.lng}));
  try {
    const r = await fetch(`${API}/export/gpx`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({start:{lat:start.lat,lng:start.lng},end:{lat:end.lat,lng:end.lng},waypoints,avoid_features:['highways']})
    });
    if(!r.ok) return;
    const blob=await r.blob(),url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url; a.download='pave.gpx'; a.click(); URL.revokeObjectURL(url);
  } finally { hl(); }
}
function sl(m){document.getElementById('lm').textContent=m;document.getElementById('ld').classList.add('on');}
function hl(){document.getElementById('ld').classList.remove('on');}
